<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>DBDパークスロット</title>
<style>
html, body{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
}

body{
  font-family:sans-serif;
  text-align:center;
  background:#000;
  color:#fff;
  text-shadow:1px 1px 2px #000;
}

#app-stage{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

#game-root{
  width:1600px;
  height:900px;
  position:relative;
  transform-origin:center center;
  will-change:transform;
  backface-visibility:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ===================== */
/* 共通ボタン */
/* ===================== */

button{
  cursor:pointer;
}

.mode-btn{
  padding:10px 18px;
  font-size:16px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,0.18);
  color:#fff;
  margin:0;
}

.mini-sound-btn{
  padding:8px 12px;
  font-size:13px;
  border:none;
  border-radius:999px;
  background:rgba(0,0,0,0.55);
  color:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
  margin:0;
}

.control-btn{
  width:100px;
  height:52px;
  border:none;
  border-radius:8px;
  background:#666;
  color:#fff;
  cursor:pointer;
  font-size:18px;
  font-weight:700;
}

.mode-btn:hover,
.mini-sound-btn:hover{
  background:rgba(255,255,255,0.24);
}

/* ===================== */
/* 画面全体フラッシュ */
/* ===================== */

.screen-flash{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0;
  background:
    radial-gradient(circle at center,
      rgba(255,230,120,0.30) 0%,
      rgba(255,140,0,0.16) 35%,
      rgba(255,60,0,0.08) 60%,
      rgba(0,0,0,0) 100%);
  transition:opacity 0.12s ease;
  z-index:9999;
}

.screen-flash.show{
  opacity:1;
}

.screen-flash.rainbow,
.screen-flash.rainbow-flash{
  background:
    radial-gradient(circle at center,
      rgba(255,255,255,0.22) 0%,
      rgba(255,80,120,0.18) 18%,
      rgba(255,180,80,0.16) 34%,
      rgba(255,240,80,0.14) 48%,
      rgba(80,255,140,0.14) 62%,
      rgba(80,190,255,0.14) 76%,
      rgba(180,80,255,0.14) 88%,
      rgba(0,0,0,0) 100%);
  animation:rainbowFlashShift 0.7s linear infinite;
}

/* ===================== */
/* 筐体ベース */
/* ===================== */

.slot-ui{
  position:relative;
  width:1600px;
  height:900px;
  margin:0 auto;
  background-image:url("assets/background.png");
  background-size:1600px 900px;
  background-position:top left;
  background-repeat:no-repeat;
  overflow:hidden;
}

.slot-base{
  position:absolute;
  top:0;
  left:0;
  width:1600px;
  height:900px;
  display:block;
  object-fit:fill;
  user-select:none;
  pointer-events:none;
  z-index:1;
}

/* ===================== */
/* 上部ヘッダー */
/* ===================== */

.slot-overlay-header{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:5;
}

.slot-lcd-ui{
  position:absolute;
  top:145px;
  left:50%;
  transform:translateX(-50%);
  width:760px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  pointer-events:auto;
  z-index:6;
}

.slot-control-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.slot-volume-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
  margin-top:-6px;
}

.slot-lcd-btn{
  margin:0;
}

.slot-overlay-creator{
  position:absolute;
  top:258px;
  left:50%;
  transform:translateX(-50%);
  width:760px;
  text-align:center;
  font-size:18px;
  color:#fff;
  opacity:0.95;
  text-shadow:0 1px 2px #000;
  pointer-events:auto;
  z-index:6;
}

.slot-overlay-creator a{
  color:#9be3ff;
  text-decoration:none;
}

.slot-overlay-creator a:hover{
  text-decoration:underline;
}

/* ===================== */
/* ステータス / 結果 / 履歴 */
/* ===================== */

.status-badge{
  position:absolute;
  top:250px;
  left:50%;
  transform:translateX(-50%);
  padding:6px 14px;
  border-radius:999px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.2);
  font-size:14px;
  color:#fff;
  z-index:20;
}

.result-area{
  position:absolute;
  top:724px;
  left:54.6%;
  transform:translateX(-50%);
  width:695px;
  height:74px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  z-index:20;
}

#resultText{
  flex:1;
  height:68px;
  box-sizing:border-box;
  padding:0 18px;
  font-size:20px;
  font-weight:900;
  letter-spacing:0.5px;
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.4);
  background:#fff;
  color:#111;
  outline:none;
  line-height:68px;
  text-align:center;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.10),
    0 2px 8px rgba(0,0,0,0.18);
}

/* ===================== */
/* リール窓 */
/* ===================== */

.reel-window{
  position:absolute;
  width:200px;
  height:200px;
  z-index:10;
}

.reel-pos1{ top:312px; left:338px; }
.reel-pos2{ top:312px; left:595px; }
.reel-pos3{ top:312px; left:852px; }
.reel-pos4{ top:312px; left:1110px; }

.reel{
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:10px;
  background:transparent;
  border:none;
  box-shadow:none;
  position:relative;
  z-index:11;
}

.reel-track{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  will-change:transform;
}

.reel-item{
  width:100%;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
}

/* サバイバー・パーク側 */
.reel-window .reel-item{
  height:200px;
  padding:8px;
  gap:8px;
}

.reel-window .reel-item img{
  width:108px;
  height:108px;
  object-fit:contain;
  flex-shrink:0;
}

.reel-window .reel-item-name{
  font-size:20px;
  font-weight:bold;
  line-height:1.15;
  text-shadow:1px 1px 2px #000;
}

/* ===================== */
/* 右上キラーリール */
/* ===================== */

.killer-side-window{
  position:absolute;
  top:32px;
  left:1266px;
  width:118px;
  height:138px;
  z-index:12;
}

.killer-side-reel{
  width:100%;
  height:100%;
  overflow:hidden;
  border-radius:8px;
  background:transparent;
  border:none;
  box-shadow:none;
  position:relative;
}

.killer-side-reel .reel-track{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  will-change:transform;
}

.killer-side-reel .reel-item{
  height:138px;
  padding:4px;
  gap:4px;
}

.killer-side-reel .reel-item img{
  width:88px;
  height:110px;
  object-fit:contain;
  margin:0;
}

.killer-side-reel .reel-item-name{
  font-size:11px;
  line-height:1.1;
  font-weight:bold;
  text-shadow:1px 1px 2px #000;
}

/* ===================== */
/* スタートレバー */
/* ===================== */

.slot-start-lever{
  border:none;
  background:transparent;
  padding:0;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slot-start-pos{
  position:absolute;
  top:560px;
  left:400px;
  width:128px;
  height:128px;
  z-index:12;
}

.slot-start-lever img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  pointer-events:none;
  filter:drop-shadow(0 8px 8px rgba(0,0,0,0.55));
  transition:transform .1s ease, filter .1s ease;
}

.slot-start-lever:hover img{
  transform:translateY(-2px);
}

.slot-start-lever:active img{
  transform:translateY(4px) scale(0.96);
  filter:brightness(0.88) drop-shadow(0 4px 4px rgba(0,0,0,0.55));
}

.slot-start-lever:disabled{
  cursor:not-allowed;
}

/* ===================== */
/* 停止ボタン */
/* ===================== */

.slot-stop-group-overlay{
  position:absolute;
  top:585px;
  left:620px;
  width:520px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:12;
}

.stop-socket{
  width:86px;
  height:86px;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  box-shadow:none;
}

.reel-stop-btn{
  width:86px;
  height:86px;
  border:none;
  background:transparent;
  padding:0;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:2;
}

.reel-stop-btn img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  pointer-events:none;
  filter:
    drop-shadow(0 2px 2px rgba(0,0,0,0.45))
    drop-shadow(0 0 4px rgba(255,60,40,0.10));
  transition:transform .08s ease, filter .08s ease;
}

.reel-stop-btn:hover:not(:disabled) img{
  transform:translateY(-1px) scale(1.03);
}

.reel-stop-btn:active:not(:disabled) img{
  transform:translateY(3px) scale(0.95);
  filter:brightness(0.82) drop-shadow(0 1px 1px rgba(0,0,0,0.45));
}

.reel-stop-btn:disabled{
  cursor:not-allowed;
}

/* 半透明にしない */
.reel-stop-btn:disabled img{
  opacity:1;
  filter:
    drop-shadow(0 2px 2px rgba(0,0,0,0.45))
    drop-shadow(0 0 4px rgba(255,60,40,0.10));
}

/* ===================== */
/* 停止ボタン発光 */
/* ===================== */

.stop-socket.active-glow{
  border-radius:50%;
  box-shadow:
    0 0 10px rgba(255, 40, 40, 0.55),
    0 0 22px rgba(255, 20, 20, 0.45),
    0 0 36px rgba(255, 0, 0, 0.30);
  animation:stopSocketGlowPulse 0.8s ease-in-out infinite alternate;
}

.stop-socket.active-glow::after{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:2px solid rgba(255, 70, 70, 0.65);
  box-shadow:
    0 0 10px rgba(255, 70, 70, 0.45),
    inset 0 0 10px rgba(255, 40, 40, 0.15);
  pointer-events:none;
}

/* ===================== */
/* リール演出 */
/* ===================== */

.reel.ready-stop{
  box-shadow:
    0 0 10px rgba(255,255,255,0.18),
    0 0 18px rgba(255,255,255,0.10);
}

.reel.stopping{
  box-shadow:
    0 0 12px rgba(255,255,255,0.22),
    0 0 22px rgba(255,255,255,0.14);
}

.reel.special-hit{
  border:2px solid #ffd700;
  box-shadow:
    0 0 16px rgba(255,215,0,0.95),
    0 0 32px rgba(255,140,0,0.70),
    0 0 48px rgba(255,80,0,0.45);
}

.reel.rainbow-hit{
  border:2px solid rgba(255,255,255,0.95);
  box-shadow:
    0 0 14px rgba(255,255,255,0.85),
    0 0 28px rgba(255,0,120,0.45),
    0 0 42px rgba(0,180,255,0.45),
    0 0 56px rgba(255,230,0,0.35);
  animation:
    rainbowBorderShift 1.2s linear infinite,
    rainbowPulse 0.7s ease-in-out infinite alternate;
  overflow:hidden;
}

.reel.rainbow-hit::before{
  content:"";
  position:absolute;
  inset:-18%;
  background:conic-gradient(
    from 0deg,
    rgba(255, 0, 102, 0.00) 0deg,
    rgba(255, 0, 102, 0.38) 35deg,
    rgba(255, 140, 0, 0.38) 75deg,
    rgba(255, 230, 0, 0.34) 110deg,
    rgba(0, 255, 140, 0.34) 160deg,
    rgba(0, 170, 255, 0.38) 215deg,
    rgba(90, 120, 255, 0.38) 260deg,
    rgba(200, 80, 255, 0.38) 310deg,
    rgba(255, 0, 102, 0.38) 360deg
  );
  filter:blur(18px) saturate(1.25);
  opacity:0.95;
  animation:rainbowSpin 1.6s linear infinite;
  pointer-events:none;
  z-index:0;
}

.reel.rainbow-hit::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      120deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.07) 30%,
      rgba(255,255,255,0.42) 48%,
      rgba(255,255,255,0.08) 62%,
      rgba(255,255,255,0) 100%
    );
  transform:translateX(-140%);
  animation:rainbowShine 1.1s ease-in-out infinite;
  pointer-events:none;
  z-index:1;
}

.reel.rainbow-hit .reel-track,
.reel.rainbow-hit .reel-item{
  position:relative;
  z-index:2;
}

.reel.flash{
  animation:reelFlash 0.16s ease-out;
  border-color:rgba(255,255,255,0.95) !important;
  box-shadow:
    0 0 18px rgba(255,255,255,1),
    0 0 34px rgba(255,255,255,0.85),
    0 0 54px rgba(255,240,180,0.55),
    0 0 78px rgba(255,255,255,0.35) !important;
  z-index:3;
}

.reel.flash-hold{
  border:2px solid rgba(255,255,255,0.98) !important;
  box-shadow:
    0 0 18px rgba(255,255,255,1),
    0 0 34px rgba(255,255,255,0.88),
    0 0 56px rgba(255,245,200,0.62),
    0 0 84px rgba(255,255,255,0.38) !important;
  animation:flashHoldPulse 0.55s ease-in-out infinite alternate;
  z-index:3;
}

.reel.frame-run{
  border-color:rgba(255,255,255,0.55);
  box-shadow:
    0 0 10px rgba(255,255,255,0.12),
    0 4px 12px rgba(0,0,0,0.35);
}

.reel.frame-lit{
  border:2px solid rgba(255,245,180,0.98);
  box-shadow:
    0 0 14px rgba(255,255,220,0.95),
    0 0 28px rgba(255,220,120,0.72),
    0 0 40px rgba(255,170,50,0.48);
}

.reel.frame-hit,
.reel.frame-win-hold{
  border:2px solid rgba(255,80,80,0.98);
  box-shadow:
    0 0 16px rgba(255,80,80,0.95),
    0 0 32px rgba(255,30,30,0.75),
    0 0 52px rgba(255,0,0,0.45);
}

/* ===================== */
/* レバー演出 */
/* ===================== */

.slot-start-lever.atari-glow img{
  animation:atariLeverGlow 0.55s ease-in-out infinite alternate;
  filter:
    drop-shadow(0 0 8px rgba(255,215,0,0.95))
    drop-shadow(0 0 18px rgba(255,160,0,0.85))
    drop-shadow(0 0 34px rgba(255,80,0,0.65));
}

.slot-start-lever.atari-rainbow img,
.slot-start-lever.rainbow-glow img{
  animation:
    rainbowLeverPulse 0.65s ease-in-out infinite alternate,
    rainbowLeverHue 1.4s linear infinite;
  filter:
    drop-shadow(0 0 10px rgba(255,255,255,0.95))
    drop-shadow(0 0 18px rgba(255,60,180,0.65))
    drop-shadow(0 0 28px rgba(0,180,255,0.65))
    drop-shadow(0 0 40px rgba(255,220,0,0.55));
}

/* ===================== */
/* キラー設定パネル */
/* ===================== */

/* ===================== */
/* パーク設定モーダル */
/* ===================== */

.modal-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.72);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:200;
}

.modal-overlay.hidden{
  display:none;
}

.perk-filter-modal{
  width:980px;
  max-width:92%;
  max-height:78%;
  display:flex;
  flex-direction:column;
  background:rgba(15,15,15,0.96);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:16px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.55),
    0 0 0 1px rgba(255,255,255,0.04) inset;
  overflow:hidden;
}

.perk-filter-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  padding:18px 20px;
  border-bottom:1px solid rgba(255,255,255,0.12);
  background:linear-gradient(to bottom, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
}

.perk-filter-title{
  font-size:22px;
  font-weight:900;
  color:#fff;
  letter-spacing:0.5px;
}

.perk-filter-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.perk-filter-body{
  padding:18px;
  overflow-y:auto;
}

.perk-filter-section{
  margin-bottom:22px;
}

.perk-filter-section:last-child{
  margin-bottom:0;
}

.perk-filter-section-title{
  font-size:18px;
  font-weight:900;
  color:#ffd36b;
  margin:0 0 12px 2px;
  text-align:left;
  letter-spacing:0.3px;
  text-shadow:0 1px 2px rgba(0,0,0,0.45);
}

.perk-checkbox-list{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:10px 12px;
  text-align:left;
}

.perk-checkbox-item{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:15px;
  font-weight:700;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:10px 12px;
  color:#fff;
}

.perk-checkbox-item input{
  transform:scale(1.15);
  cursor:pointer;
}

.perk-filter-footer{
  padding:14px 18px;
  border-top:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.03);
  text-align:right;
}

.small-btn{
  padding:8px 12px;
  font-size:14px;
  width:auto;
  height:auto;
  border-radius:8px;
}

/* ===================== */
/* アニメーション */
/* ===================== */

@keyframes stopSocketGlowPulse{
  from{
    transform:scale(1);
    box-shadow:
      0 0 8px rgba(255, 40, 40, 0.42),
      0 0 16px rgba(255, 20, 20, 0.32),
      0 0 26px rgba(255, 0, 0, 0.20);
  }
  to{
    transform:scale(1.04);
    box-shadow:
      0 0 12px rgba(255, 70, 70, 0.72),
      0 0 26px rgba(255, 30, 30, 0.56),
      0 0 42px rgba(255, 0, 0, 0.34);
  }
}

@keyframes atariLeverGlow{
  from{
    transform:scale(1);
    filter:
      brightness(1.05)
      drop-shadow(0 0 8px rgba(255,215,0,0.85))
      drop-shadow(0 0 18px rgba(255,160,0,0.55));
  }
  to{
    transform:scale(1.06);
    filter:
      brightness(1.28)
      drop-shadow(0 0 14px rgba(255,215,0,1))
      drop-shadow(0 0 28px rgba(255,140,0,0.95))
      drop-shadow(0 0 44px rgba(255,60,0,0.75));
  }
}

@keyframes rainbowSpin{
  from{ transform:rotate(0deg) scale(1); }
  to{ transform:rotate(360deg) scale(1); }
}

@keyframes rainbowBorderShift{
  0%{ filter:hue-rotate(0deg) saturate(1.1); }
  100%{ filter:hue-rotate(360deg) saturate(1.35); }
}

@keyframes rainbowPulse{
  from{
    transform:scale(1);
    box-shadow:
      0 0 14px rgba(255,255,255,0.75),
      0 0 28px rgba(255,0,120,0.35),
      0 0 42px rgba(0,180,255,0.35),
      0 0 56px rgba(255,230,0,0.25);
  }
  to{
    transform:scale(1.045);
    box-shadow:
      0 0 18px rgba(255,255,255,0.95),
      0 0 34px rgba(255,0,120,0.55),
      0 0 52px rgba(0,180,255,0.52),
      0 0 70px rgba(255,230,0,0.42);
  }
}

@keyframes rainbowShine{
  0%{ transform:translateX(-140%); opacity:0; }
  20%{ opacity:1; }
  60%{ opacity:1; }
  100%{ transform:translateX(140%); opacity:0; }
}

@keyframes rainbowLeverPulse{
  from{ transform:scale(1); }
  to{ transform:scale(1.08); }
}

@keyframes rainbowLeverHue{
  0%{ filter:hue-rotate(0deg) brightness(1.08); }
  100%{ filter:hue-rotate(360deg) brightness(1.28); }
}

@keyframes rainbowFlashShift{
  from{ filter:hue-rotate(0deg) saturate(1.1); }
  to{ filter:hue-rotate(360deg) saturate(1.35); }
}

.exhaustion-arm.left{
  width:83px;      /* 104px → 約80% */
  height:120px;    /* 150px → 約80% */

  animation:exhaustionLeftHandLift 2.8s ease-in-out infinite;
}

/* 右手：左へ軽くガリガリ */
.exhaustion-arm.right{
  width:96px;
  height:80px;
  top:-8px;
  right:-18px;
  transform-origin:18% 68%;
  animation:exhaustionRightHandScratch 1.2s steps(3, end) infinite;

  return allParks.filter(park => {

    const name = String(park.name || "").trim();

function loadEnabledPerks() {
  const savedNormal = localStorage.getItem("dbd_enabled_survivor_perks");
  const savedExhaustion = localStorage.getItem("dbd_enabled_exhaustion_perks");

  if (savedNormal) {
    try {
      const parsed = JSON.parse(savedNormal);
      enabledPerkKeys = new Set(parsed);
    } catch (e) {
      console.error("enabled normal perks load error:", e);
      enabledPerkKeys = new Set(getAllNormalPerks().map(getPerkKey));
    }
  } else {
    enabledPerkKeys = new Set(getAllNormalPerks().map(getPerkKey));
  }

  if (savedExhaustion) {
    try {
      const parsed = JSON.parse(savedExhaustion);
      enabledExhaustionPerkKeys = new Set(parsed);
    } catch (e) {
      console.error("enabled exhaustion perks load error:", e);
      enabledExhaustionPerkKeys = new Set(getAllExhaustionPerks().map(getPerkKey));
    }
  } else {
    enabledExhaustionPerkKeys = new Set(getAllExhaustionPerks().map(getPerkKey));
  }
}

function showPerkTooltip(park, mouseX, mouseY) {
  const tooltip = document.getElementById("perkTooltip");
  const title = document.getElementById("perkTooltipTitle");
  const desc = document.getElementById("perkTooltipDesc");

  if (!tooltip || !title || !desc || !park) return;

  title.textContent = park.name || "";
  desc.textContent = park.description || "説明なし";

  tooltip.classList.remove("hidden");

  const offset = 18;
  const tooltipRect = tooltip.getBoundingClientRect();

  let left = mouseX + offset;
  let top = mouseY + offset;

  if (left + tooltipRect.width > window.innerWidth - 12) {
    left = mouseX - tooltipRect.width - offset;
  }

  if (top + tooltipRect.height > window.innerHeight - 12) {
    top = window.innerHeight - tooltipRect.height - 12;
  }

  if (left < 12) left = 12;
  if (top < 12) top = 12;

  tooltip.style.left = `${left}px`;
  tooltip.style.top = `${top}px`;
}

}

function buildReel(reelId) {
  const reel = document.getElementById(reelId);
  if (!reel) return;

  reel.innerHTML = "";

  const reelIndex = REEL_IDS.indexOf(reelId);
  const reelParks = getReelParkList(reelIndex);
  const extended = [];

  for (let i = 0; i < REEL_COPY_COUNT; i++) {
    extended.push(...reelParks);
  }

  extended.forEach(park => {
    const item = document.createElement("div");
    item.className = "reel-item";

    const img = document.createElement("img");
    img.src = park.icon;
    img.alt = park.name;
    img.onerror = function () {
      this.onerror = null;
      this.src = makeFallbackIcon(park.name);
    };

    const name = document.createElement("div");
    name.className = "reel-item-name";
    name.textContent = park.name;

    item.appendChild(img);
    item.appendChild(name);
    reel.appendChild(item);
  });

  const state = reelStates[reelId];
  const reelLength = reelParks.length;
  const listHeight = reelLength * ITEM_HEIGHT;

  if (typeof state.y !== "number" || !isFinite(state.y)) {
    state.y = -(reelLength * ITEM_HEIGHT * REEL_MIDDLE_COPY);
  }

  const minY = -(listHeight * (REEL_COPY_COUNT - 1));
  const maxY = -listHeight;

  while (state.y >= maxY) state.y -= listHeight;
  while (state.y < minY) state.y += listHeight;

  reel.style.transition = "none";
  reel.style.transform = `translateY(${state.y}px)`;
}

function getReelParkList(reelIdOrIndex) {
  const reelIndex =
    typeof reelIdOrIndex === "number"
      ? reelIdOrIndex
      : REEL_IDS.indexOf(reelIdOrIndex);

  // 4番目リールは疲労系専用
  if (reelIndex === PUBLIC_MATCH_FIXED_REEL_INDEX) {
    const exhaustion = getFixedExhaustionParks();
    const noPerk = allParks.find(p => p.name === "パークなし");

    return noPerk ? [...exhaustion, noPerk] : exhaustion;
  }

  // 1〜3番目リールは疲労系を完全除外
  const reels123 = getReels123Parks();

  const enabledNormal = reels123.filter(park => {
    const name = String(park.name || "").trim();

    if (name === "パークなし") return false;
    if (name === "パーク自由") return false;
    if (name === "自由確定") return false;

    return enabledPerkKeys.has(getPerkKey(park));
  });

  const noPerks = reels123.filter(park => park.name === "パークなし");
  const freeParks = reels123.filter(park => park.name === "パーク自由");

  // 全解除時でも パークなし / パーク自由 は残す
  return [...enabledNormal, ...noPerks, ...freeParks];
}

function wrapReelY(reelId) {
  const state = reelStates[reelId];
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;

  const minY = -(listHeight * (REEL_COPY_COUNT - 1));
  const maxY = -listHeight;

  while (state.y >= maxY) {
    state.y -= listHeight;
  }
  while (state.y < minY) {
    state.y += listHeight;
  }
}

function normalizeReelTop(y, reelId) {
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;
  return ((-y % listHeight) + listHeight) % listHeight;
}

function getDisplayedParkFromY(y, reelId) {
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;
  const normalizedTop = ((-y % listHeight) + listHeight) % listHeight;

  const centeredIndex = Math.round((normalizedTop + CENTER_OFFSET) / ITEM_HEIGHT) % reelParks.length;
  return reelParks[centeredIndex];
}

function computeStopYForFixedDuration(currentY, parkIndex, reelId, minSteps = 1) {
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;

  const normalizedTop = ((-currentY % listHeight) + listHeight) % listHeight;
  const targetTop = parkIndex * ITEM_HEIGHT - CENTER_OFFSET;

  let delta = targetTop - normalizedTop;

  while (delta <= 0) delta += listHeight;
  while (delta < minSteps * ITEM_HEIGHT) delta += listHeight;

  let targetY = currentY - delta;

  const minY = -(listHeight * (REEL_COPY_COUNT - 1));
  const maxY = -listHeight;

  while (targetY >= maxY) targetY -= listHeight;
  while (targetY < minY) targetY += listHeight;

  return targetY;
}

function getMostVisibleIndexFromCurrentY(y, reelId) {
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;
  const normalizedTop = ((-y % listHeight) + listHeight) % listHeight;

  let bestIndex = 0;
  let bestVisible = -1;

  for (let i = 0; i < reelParks.length; i++) {
    const itemTop = i * ITEM_HEIGHT;
    const itemBottom = itemTop + ITEM_HEIGHT;

    let visible = 0;

    const viewTop = normalizedTop;
    const viewBottom = normalizedTop + VIEW_HEIGHT;

    if (viewBottom <= listHeight) {
      const overlapTop = Math.max(viewTop, itemTop);
      const overlapBottom = Math.min(viewBottom, itemBottom);
      visible = Math.max(0, overlapBottom - overlapTop);
    } else {
      const firstViewTop = viewTop;
      const firstViewBottom = listHeight;
      const secondViewTop = 0;
      const secondViewBottom = viewBottom - listHeight;

      const overlap1Top = Math.max(firstViewTop, itemTop);
      const overlap1Bottom = Math.min(firstViewBottom, itemBottom);
      const part1 = Math.max(0, overlap1Bottom - overlap1Top);

      const overlap2Top = Math.max(secondViewTop, itemTop);
      const overlap2Bottom = Math.min(secondViewBottom, itemBottom);
      const part2 = Math.max(0, overlap2Bottom - overlap2Top);

      visible = part1 + part2;
    }

    if (visible > bestVisible) {
      bestVisible = visible;
      bestIndex = i;
    }
  }

  return bestIndex;
}

function finishReelStop(reelId) {
  const index = REEL_IDS.indexOf(reelId);
  const state = reelStates[reelId];
  const frame = document.getElementById(FRAME_IDS[index]);

  state.phase = "stopped";
  frame?.classList.remove("stopping", "ready-stop", "special-hit", "rainbow-hit");

  if (isRainbowPerk(state.finalPark)) {
    frame?.classList.add("rainbow-hit");
  } else if (isSpecialPerk(state.finalPark)) {
    frame?.classList.add("special-hit");
  } else {
    frame?.classList.add("ready-stop");
  }

  reelResults[index] = state.finalPark;

  if (state.finalPark && !isSpecialPerk(state.finalPark) && !isRainbowPerk(state.finalPark)) {
    const key = getPerkKey(state.finalPark);
    if (!lockedPerkKeys.includes(key)) {
      lockedPerkKeys.push(key);
    }
  }

  stoppedReelCount++;

  const allStopped = REEL_IDS.every(id => reelStates[id].phase === "stopped");

  if (allStopped) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
    runUraLotteryIfNeeded();
  }
}

function isSpecialPerk(park) {
  if (!park) return false;

}

function isRainbowPerk(park) {
  if (!park) return false;
  return String(park.name || "").trim() === "自由確定";
}

function isLockedPark(park) {
  if (!park) return false;
  if (isSpecialPerk(park)) return false;
  return lockedPerkKeys.includes(getPerkKey(park));
}

function getAllowedStopIndexFromCurrentY(y, reelId) {
  const reelParks = getReelParkList(reelId);
  const startIndex = getMostVisibleIndexFromCurrentY(y, reelId);

  // 4番目リールは疲労系固定枠なので、そのまま止める
  if (REEL_IDS.indexOf(reelId) === PUBLIC_MATCH_FIXED_REEL_INDEX) {
    return startIndex;
  }

  for (let step = 0; step < reelParks.length; step++) {
    const idx = (startIndex + step) % reelParks.length;
    const park = reelParks[idx];

    if (!isLockedPark(park)) {
      return idx;
    }
  }

  return startIndex;
}

/**
 * 現在位置から「前に進む方向」へ最短でスナップする
 * 余計に1周させない
 */
function getSnapTargetY(currentY, parkIndex, reelId) {
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;
  const normalizedTop = normalizeReelTop(currentY, reelId);
  const targetTop = parkIndex * ITEM_HEIGHT - CENTER_OFFSET;

  let deltaTop = targetTop - normalizedTop;

  while (deltaTop <= -listHeight / 2) deltaTop += listHeight;
  while (deltaTop > listHeight / 2) deltaTop -= listHeight;

  return currentY - deltaTop;
}

function recenterReelForUra(reelId) {
  const state = reelStates[reelId];
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;

  const normalizedTop = normalizeReelTop(state.y, reelId);
  state.y = -(listHeight * 1) - normalizedTop;

  applyReelTransform(reelId);
}

function getUraStopTargetY(targetIndex, reelId) {
  const reelParks = getReelParkList(reelId);
  const listHeight = reelParks.length * ITEM_HEIGHT;
  const targetTop = targetIndex * ITEM_HEIGHT - CENTER_OFFSET;

  return -(listHeight * 3) - targetTop;
}

function stopReel(index) {
  if (!isShuffling || isUraProcessing) return;
  if (isFreeReel(index)) return;

  const reelId = REEL_IDS[index];
  const state = reelStates[reelId];
  const frame = document.getElementById(FRAME_IDS[index]);
  const stopBtn = document.getElementById(STOP_BTN_IDS[index]);

  if (!state || state.phase !== "spinning") return;

  state.stopRequested = true;
  state.phase = "stopping";
  state.stopFromY = state.y;

  const reelParks = getReelParkList(reelId);
  const stopIndex = getAllowedStopIndexFromCurrentY(state.y, reelId);
  const stopPark = reelParks[stopIndex];
  state.finalPark = stopPark;

  state.stopTargetY = getSnapTargetY(state.y, stopIndex, reelId);

  const distance = Math.abs(state.stopTargetY - state.y);
  const duration = Math.max(80, Math.min(180, distance * 0.35));

  state.stopStartMs = performance.now();
  state.stopEndMs = state.stopStartMs + duration;

  frame?.classList.add("stopping");
  if (stopBtn) stopBtn.disabled = true;

  setStopButtonGlow(index, false);
  playStopSe();
}

function pickFreeReelCount() {
  const r = Math.random();
  let acc = 0;

  for (const item of FREE_REEL_DISTRIBUTION) {
    acc += item.rate;
    if (r < acc) return item.count;
  }

  return 1;
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function pickFreeReelIndexes() {
  const freeCount = pickFreeReelCount();
  const indexes = shuffleArray([0, 1, 2, 3]).slice(0, freeCount);
  return indexes.sort((a, b) => a - b);
}

function stopFreeReelInstant(index) {
  const reelId = REEL_IDS[index];
  const state = reelStates[reelId];
  const frame = document.getElementById(FRAME_IDS[index]);

  if (!state) return;

  const forcedPark = getForcedSpecialParkForReel(index);
  const reelParks = getReelParkList(reelId);

  let targetIndex = reelParks.findIndex(
    p => p.name === forcedPark.name && p.icon === forcedPark.icon
  );

  state.phase = "stopped";
  state.stopRequested = true;
  state.finalPark = forcedPark;

  // そのリール配列内に自由確定が無い場合でも、強制表示で確実に出す
  if (targetIndex < 0) {
    reelResults[index] = forcedPark;
    forceReelDisplay(index, forcedPark, true);

    if (stopBtn) stopBtn.disabled = true;
    setStopButtonGlow(index, false);
    return;
  }

  state.stopTargetY = getSnapTargetY(state.y, targetIndex, reelId);
  state.y = state.stopTargetY;

  applyReelTransform(reelId);

  frame?.classList.remove("ready-stop", "stopping", "special-hit", "rainbow-hit");

  if (isRainbowPerk(forcedPark)) {
    frame?.classList.add("rainbow-hit");
  } else if (isSpecialPerk(forcedPark)) {
    frame?.classList.add("special-hit");
  } else {

  }

  if (stopBtn) stopBtn.disabled = true;
  setStopButtonGlow(index, false);

  reelResults[index] = forcedPark;
}

function reelLoop(timestamp) {
  if (!isShuffling) return;

  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;

  REEL_IDS.forEach(reelId => {
    const state = reelStates[reelId];
    if (!state) return;

    if (state.phase === "spinning") {
      state.y += state.speed * dt;
      wrapReelY(reelId);
      applyReelTransform(reelId);
      return;
    }

    if (state.phase === "stopping") {
      const total = state.stopEndMs - state.stopStartMs;
      const elapsed = Math.min(timestamp - state.stopStartMs, total);
      const t = Math.max(0, Math.min(elapsed / total, 1));

      // 少しだけスロットっぽく減速
      const eased = 1 - Math.pow(1 - t, 2.2);

      state.y = state.stopFromY + (state.stopTargetY - state.stopFromY) * eased;
      applyReelTransform(reelId);

      if (t >= 1) {
        state.y = state.stopTargetY;
        applyReelTransform(reelId);
        finishReelStop(reelId);
      }
    }
  });

  if (isShuffling) {
    animationFrameId = requestAnimationFrame(reelLoop);
  }
}

  );

    setStartLeverGlow(true, hasRainbow);
    playAtariSe();
    triggerSpecialFlash(hasRainbow);
  }

  REEL_IDS.forEach((reelId, i) => {
    const state = reelStates[reelId];
    const stopBtn = document.getElementById(STOP_BTN_IDS[i]);
    const frame = document.getElementById(FRAME_IDS[i]);

    if (isFreeReel(i)) {
      state.phase = "spinning";
      state.speed = 1700 + Math.random() * 200;

      setTimeout(() => {
        stopFreeReelInstant(i);
      }, 600 + Math.random() * 300);

      return;
    }

    state.phase = "spinning";
    state.speed = 1700 + (i * 120) + Math.random() * 120;

    frame?.classList.add("ready-stop");

  });

  setAllStopButtonGlow(false);

  for (let i = 0; i < REEL_IDS.length; i++) {
    stopFreeReelInstant(i);

    const frame = document.getElementById(FRAME_IDS[i]);
    const forcedPark = getForcedSpecialParkForReel(i);

    frame?.classList.remove("special-hit", "rainbow-hit", "ready-stop", "stopping");

    if (isRainbowPerk(forcedPark)) {
      frame?.classList.add("rainbow-hit");
    } else if (isSpecialPerk(forcedPark)) {
      frame?.classList.add("special-hit");
    } else {
      frame?.classList.add("ready-stop");
    }
  }

  cancelAnimationFrame(animationFrameId);
  animationFrameId = null;

  playStopSe();
  playKakuteiSe();
  triggerSpecialFlash(true);
  showResult();
  isShuffling = false;
  setStatus("当たり！ 1〜3リール自由確定 / 4リールはパークなし");
  setStartLeverGlow(false);

  if (startLever) startLever.disabled = false;
  return;
}

    animationFrameId = requestAnimationFrame(reelLoop);

  if (autoStopEnabled) {
    scheduleAutoStopSequence();
  }

for (let i = 0; i < REEL_IDS.length; i++) {

function scheduleAutoStopSequence() {
  if (!autoStopEnabled) return;
  if (!isShuffling) return;

  clearAutoStopTimers();

  const sessionId = autoStopSessionId;
  let totalDelay = 0; // スタート後まず0秒待つ

  for (let i = 0; i < REEL_IDS.length; i++) {
    if (isFreeReel(i)) continue;

    totalDelay += getRandomAutoStopDelayMs();

    const timerId = setTimeout(() => {
      if (sessionId !== autoStopSessionId) return;
      if (!autoStopEnabled) return;
      if (!isShuffling) return;
      if (isUraProcessing || isDoorChanceProcessing || isFrameEventProcessing) return;

      const state = reelStates[REEL_IDS[i]];
      if (!state || state.phase !== "spinning") return;

      stopReel(i);
    }, totalDelay);

    autoStopTimers.push(timerId);
  }
}

  for (const reelIndex of noPerkIndexes) {
    const exclude = plan.map(x => x.perkName);
    const candidates = getRevivalCandidates(usedNames.concat(exclude), exclude);

    if (candidates.length === 0) continue;

    const perkName = candidates[Math.floor(Math.random() * candidates.length)];
    plan.push({ reelIndex, perkName });
  }

  return plan;
}

function flashAllReels(times, holdAfter = false, callback) {
  const sessionId = uraSessionId;
  let count = 0;

  const flashOnMs = 300;    // 光っている時間
  const flashGapMs = 250;   // 次に光るまでの間隔
  const endWaitMs = 500;    // 当たり時の最後の待ち
  const hazureDelayMs = 300; // ハズレ時、3回点灯後に音を出すまでの待ち

  const doFlash = () => {
    if (sessionId !== uraSessionId) return;

    FRAME_IDS.forEach(id => {
      const frame = document.getElementById(id);
      if (!frame) return;

      frame.classList.add("flash");

      setTimeout(() => {
        if (sessionId !== uraSessionId) return;
        frame.classList.remove("flash");
      }, flashOnMs);
    });

    count++;

    if (count >= times) {
      // 当たりなら最後に光を保持
      if (holdAfter) {
        setTimeout(() => {
          if (sessionId !== uraSessionId) return;

          FRAME_IDS.forEach(id => {
            const frame = document.getElementById(id);
            if (frame) frame.classList.add("flash-hold");
          });

          setTimeout(() => {
            if (sessionId !== uraSessionId) return;
            if (callback) callback();
          }, endWaitMs);
        }, flashOnMs);

        return;
      }

      // ハズレなら3回目点灯のあと0.3秒空けてからコールバック
      setTimeout(() => {
        if (sessionId !== uraSessionId) return;

        setTimeout(() => {
          if (sessionId !== uraSessionId) return;
          if (callback) callback();
        }, hazureDelayMs);

      }, flashOnMs);

      return;
    }

    setTimeout(doFlash, flashOnMs + flashGapMs);
  };

  doFlash();
}

function finalizeResultDisplay(playFinalSe = true) {
  clearAutoStopTimers();

  REEL_IDS.forEach((_, index) => {
    const park = reelResults[index];
    if (!park) return;
    forceReelDisplay(index, park, true);
  });

  isShuffling = false;
  isStopping = false;
  isUraProcessing = false;
  isDoorChanceProcessing = false;
  isFrameEventProcessing = false;
  uraResolved = true;
  uraTargetIndexes = [];

  cancelAnimationFrame(animationFrameId);
  animationFrameId = null;

  setStartLeverGlow(false);

  FRAME_IDS.forEach((frameId, index) => {
    const frame = document.getElementById(frameId);
    const park = reelResults[index];

    frame?.classList.remove(
      "stopping",
      "ready-stop",
      "flash",
      "flash-hold",
      "frame-run",
      "frame-lit",
      "frame-hit",
      "frame-flash-all"
    );

    if (isRainbowPerk(park)) {
      frame?.classList.add("rainbow-hit");
      frame?.classList.remove("special-hit");
    } else if (isSpecialPerk(park) || REVIVAL_PERKS.includes(park?.name)) {
      frame?.classList.add("special-hit");
      frame?.classList.remove("rainbow-hit");
    } else {
      frame?.classList.remove("special-hit", "rainbow-hit");
      frame?.classList.add("ready-stop");
    }
  });

  showResult();

  if (playFinalSe) {
    playKakuteiSe();
  }

  const startLever = document.querySelector(".slot-start-lever");
  if (startLever) startLever.disabled = false;

  STOP_BTN_IDS.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = true;
  });

  setAllStopButtonGlow(false);
}

function spinRevivalReel(index, perkName, sessionId) {
  const reelId = REEL_IDS[index];
  const state = reelStates[reelId];
  const frame = document.getElementById(FRAME_IDS[index]);

  const targetPark = allParks.find(p => p.name === perkName);
  if (!targetPark) return Promise.resolve(false);

  const reelParks = getReelParkList(reelId);
const targetIndex = reelParks.findIndex(
  p => p.name === targetPark.name && p.icon === targetPark.icon
);

  return new Promise(resolve => {
    if (state._uraAnimId) {
      cancelAnimationFrame(state._uraAnimId);
      state._uraAnimId = null;
    }

    frame?.classList.remove("special-hit", "rainbow-hit", "ready-stop", "flash-hold", "flash");
    frame?.classList.add("stopping");

    state.phase = "spinning";
    state.speed = 2600;
    state.finalPark = null;
    state.stopRequested = false;
    state.stopTargetY = null;
    state.stopFromY = state.y;
    state.stopStartMs = null;
    state.stopEndMs = null;
    state._lastTempSpinTime = 0;

    // 裏抽選用に安全なコピー位置へ再配置
    recenterReelForUra(reelId);

    const spinStart = performance.now();
    const fakeSpinDuration = 1200;

    const spinLoop = (now) => {
      if (!isUraProcessing || sessionId !== uraSessionId) {
        frame?.classList.remove("stopping");
        state._uraAnimId = null;
        resolve(false);
        return;
      }

      if (!state._lastTempSpinTime) {
        state._lastTempSpinTime = now;
      }

      const dt = Math.min((now - state._lastTempSpinTime) / 1000, 0.05);
      state._lastTempSpinTime = now;

      state.y += state.speed * dt;
      applyReelTransform(reelId);

      if (now - spinStart < fakeSpinDuration) {
        state._uraAnimId = requestAnimationFrame(spinLoop);
        return;
      }

      state.phase = "stopping";
      state.stopFromY = state.y;
      state.finalPark = targetPark;
      state.stopTargetY = getUraStopTargetY(targetIndex, reelId);
      state.stopStartMs = performance.now();
      state.stopEndMs = state.stopStartMs + 650;

      const settleLoop = (ts) => {
        if (!isUraProcessing || sessionId !== uraSessionId) {
          frame?.classList.remove("stopping");
          state._uraAnimId = null;
          resolve(false);
          return;
        }

        const total = state.stopEndMs - state.stopStartMs;
        const elapsed = Math.min(ts - state.stopStartMs, total);
        const t = Math.max(0, Math.min(elapsed / total, 1));
        const eased = 1 - Math.pow(1 - t, 2.8);

        state.y = state.stopFromY + (state.stopTargetY - state.stopFromY) * eased;
        applyReelTransform(reelId);

        if (t < 1) {
          state._uraAnimId = requestAnimationFrame(settleLoop);
          return;
        }

        state.y = state.stopTargetY;
        applyReelTransform(reelId);

        state.phase = "stopped";
        state.finalPark = targetPark;
        reelResults[index] = targetPark;

        frame?.classList.remove("stopping");
        frame?.classList.add("special-hit");

        state._uraAnimId = null;
        resolve(true);
      };

      state._uraAnimId = requestAnimationFrame(settleLoop);
    };

    state._uraAnimId = requestAnimationFrame(spinLoop);
  });
}

async function runUraLotteryIfNeeded() {
  if (uraResolved || isUraProcessing) return;

  const noPerkIndexes = getNoPerkIndexes();

  // パークなしが無ければ裏抽選なしで次へ
  if (noPerkIndexes.length === 0) {
    runFrameEventIfNeeded();
    return;
  }

  // パークなしがあっても、まず40%で裏抽選に突入するか抽選
  const shouldEnterUra = Math.random() < URA_ENTRY_RATE;
  if (!shouldEnterUra) {
    finalizeResultDisplay();
    return;
  }

  uraResolved = true;
  isUraProcessing = true;
  const sessionId = ++uraSessionId;

  const startLever = document.querySelector(".slot-start-lever");
  if (startLever) startLever.disabled = true;

  STOP_BTN_IDS.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = true;
  });

  const isHit = Math.random() < URA_HIT_RATE;

  flashAllReels(3, isHit, async () => {
    if (sessionId !== uraSessionId) return;

    if (!isHit) {
      playUraHazure();
      finalizeResultDisplay();
      return;
    }

    playUraAtari();

    noPerkIndexes.forEach(i => {
      const frame = document.getElementById(FRAME_IDS[i]);
      frame?.classList.remove("flash-hold", "flash");
    });

    const revivalPlan = pickRevivalPlan(noPerkIndexes);

    if (!revivalPlan.length) {
      playUraHazure();
      finalizeResultDisplay();
      return;
    }

    uraTargetIndexes = revivalPlan.map(x => x.reelIndex);
    uraSpinPendingCount = revivalPlan.length;

    const results = await Promise.all(
      revivalPlan.map(({ reelIndex, perkName }) =>
        spinRevivalReel(reelIndex, perkName, sessionId)
      )
    );

    if (sessionId !== uraSessionId) return;

    const successCount = results.filter(Boolean).length;

    if (successCount === 0) {
      playUraHazure();
    }

    finalizeResultDisplay();
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function clearFrameEventClasses() {
  FRAME_IDS.forEach(id => {
    const frame = document.getElementById(id);
    if (!frame) return;
    frame.classList.remove("frame-run", "frame-lit", "frame-hit", "frame-flash-all", "frame-win-hold");
  });
}

function holdWinningFramesRed() {
  FRAME_IDS.forEach(id => {
    const frame = document.getElementById(id);
    if (!frame) return;

    frame.classList.remove("frame-run", "frame-lit", "frame-hit", "frame-flash-all");
    frame.classList.add("frame-win-hold");
  });
}

function setFramesLit(indexes = [], mode = "lit") {
  FRAME_IDS.forEach((id, i) => {
    const frame = document.getElementById(id);
    if (!frame) return;

    frame.classList.remove("frame-run", "frame-lit", "frame-hit");

    if (indexes.includes(i)) {
      frame.classList.add(mode === "hit" ? "frame-hit" : "frame-lit");
    }
  });
}

function addFrameRun(indexes = []) {
  FRAME_IDS.forEach((id, i) => {
    const frame = document.getElementById(id);
    if (!frame) return;

    frame.classList.remove("frame-run");
    if (indexes.includes(i)) {
      frame.classList.add("frame-run");
    }
  });
}

async function flashAllFrames(times = 3, interval = 140, hitMode = true, sessionId = 0) {
  for (let t = 0; t < times; t++) {
    if (sessionId !== frameEventSessionId) return false;

    FRAME_IDS.forEach(id => {
      const frame = document.getElementById(id);
      if (!frame) return;
      frame.classList.add(hitMode ? "frame-hit" : "frame-lit", "frame-flash-all");
    });

    await sleep(interval);

    if (sessionId !== frameEventSessionId) return false;

    FRAME_IDS.forEach(id => {
      const frame = document.getElementById(id);
      if (!frame) return;
      frame.classList.remove("frame-flash-all");
      if (!hitMode) frame.classList.remove("frame-lit");
    });

    await sleep(interval);
  }

  return true;
}

function hasNoPerkInResults() {
  return reelResults.some(park => park && park.name === "パークなし");
}

function canRunFrameEvent() {
  if (currentSpecialHit) return false;           // 今回スタート時に確定演出が発動していない
  if (isUraProcessing) return false;
  if (isFrameEventProcessing) return false;
  if (reelResults.length !== 4) return false;
  if (reelResults.some(p => !p)) return false;
  if (hasNoPerkInResults()) return false;        // パークなし が1つでもあれば不発
  return true;
}

function pickCurrentStartSpecialHit() {
  // 前回イベントで次回ブーストが仕込まれているなら、今回だけ優先適用
  if (pendingNextSpecialRate != null) {
    const hit = Math.random() < pendingNextSpecialRate;
    pendingNextSpecialRate = null;
    pendingNextSpecialSource = null;
    return hit;
  }

  return Math.random() < SPECIAL_HIT_RATE;
}

function setPendingNextSpecialFromEvent(eventType) {
  if (eventType === "event1") {
    pendingNextSpecialRate = NEXT_FREE_RATE_EVENT1;
    pendingNextSpecialSource = "event1";
  } else if (eventType === "event2") {
    pendingNextSpecialRate = NEXT_FREE_RATE_EVENT2;
    pendingNextSpecialSource = "event2";
  }
}

async function playFrameEvent1(isHit, sessionId) {
  clearFrameEventClasses();

  // 左→右 白演出
  for (let i = 0; i < FRAME_IDS.length; i++) {
    if (sessionId !== frameEventSessionId) return false;

    setFramesLit([i], "lit");
    await sleep(200);
  }

  if (sessionId !== frameEventSessionId) return false;
  await sleep(250);

  if (!isHit) {
    clearFrameEventClasses();
    return true;
  }

  // 一瞬全白
  setFramesLit([0,1,2,3], "lit");
  await sleep(120);

  // 白フラッシュ
  await flashAllFrames(2, 80, false, sessionId);

  // 赤確定
  setFramesLit([0,1,2,3], "hit");

  return true;
}

async function playFrameEvent2(isHit, sessionId) {
  clearFrameEventClasses();

  const sequence = [
    [0,2],
    [1,3],
    [0,2],
    [1,3],
    [0,2],
    [1,3]
  ];

  // 白往復
  for (const indexes of sequence) {
    if (sessionId !== frameEventSessionId) return false;

    setFramesLit(indexes, "lit");
    await sleep(180);
  }

  if (!isHit) {
    clearFrameEventClasses();
    return true;
  }

  // 一瞬全白
  setFramesLit([0,1,2,3], "lit");
  await sleep(120);

  // 白フラッシュ
  await flashAllFrames(2, 80, false, sessionId);

  // 赤確定
  setFramesLit([0,1,2,3], "hit");

  return true;
}

async function runFrameEventIfNeeded() {
  if (!canRunFrameEvent()) {
    finalizeResultDisplay();
    return;
  }

  const trigger = Math.random() < FRAME_EVENT_TRIGGER_RATE;
  if (!trigger) {
  await runDoorChanceIfNeeded();
  return;
}

  isFrameEventProcessing = true;
  const sessionId = ++frameEventSessionId;

  const startLever = document.querySelector(".slot-start-lever");
  if (startLever) startLever.disabled = true;

  STOP_BTN_IDS.forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = true;
  });

  let isHit = false;

  try {
    const isEvent1 = Math.random() < FRAME_EVENT1_RATE;
    const eventType = isEvent1 ? "event1" : "event2";
    isHit = Math.random() < (isEvent1 ? FRAME_EVENT1_HIT_RATE : FRAME_EVENT2_HIT_RATE);

    if (isEvent1) {
      await playFrameEvent1(isHit, sessionId);
    } else {
      await playFrameEvent2(isHit, sessionId);
    }

    if (sessionId !== frameEventSessionId) return;

    if (isHit) {
      setPendingNextSpecialFromEvent(eventType);

      // 激アツ音
      playGekiatuSound();

      // 当たり音
      playUraAtari();

      // 赤フレーム保持
      holdWinningFramesRed();
    } else {
      playUraHazure();
      clearFrameEventClasses();
    }

    await sleep(250);

  } catch (e) {
    console.error("runFrameEventIfNeeded error:", e);
    } finally {
    isFrameEventProcessing = false;

    if (!isShuffling || reelResults.length === 4) {
      finalizeResultDisplay();
    }

    if (isHit) {
      holdWinningFramesRed();
    }
  }
}

function breakItaClip() {
  if (!slotIta) return;
  slotIta.style.display = "none";
}

function playParkChanceWithClipBreak() {
  const video = document.getElementById("parkChanceVideo");
  breakItaClip();

  setTimeout(() => {
    if (!video) return;
    video.style.display = "block";
    video.currentTime = 0;
    video.play().catch(() => {});
  }, 120);
}

function flashScreenQuick() {
  const flash = document.getElementById("screenFlash");
  if (!flash) return;

  flash.classList.add("show");
  setTimeout(() => flash.classList.remove("show"), 90);
}


function hideParkChanceVideo() {
  const video = document.getElementById("parkChanceVideo");
  if (!video) return;

  video.pause();
  video.currentTime = 0;
  video.style.display = "none";
}

function setExhaustionFrameTight(enabled) {
  // 今回は tight 演出を使わない
}

function isExhaustionReelIndex(index) {
  return index === PUBLIC_MATCH_FIXED_REEL_INDEX;
}


function showResult() {
  const names = reelResults.map(p => p?.name || "").filter(Boolean);
  const text = names.join(" / ");

  const input = document.getElementById("resultText");
  if (input) input.value = text;
}

const BASE_WIDTH = 1600;
const BASE_HEIGHT = 900;

function fitGameToWindow() {
  const stage = document.getElementById("app-stage");
  const root = document.getElementById("game-root");
  if (!stage || !root) return;

  const stageWidth = stage.clientWidth;
  const stageHeight = stage.clientHeight;

  const scaleX = stageWidth / BASE_WIDTH;
  const scaleY = stageHeight / BASE_HEIGHT;
  const scale = Math.min(scaleX, scaleY);

  root.style.transform = `scale(${scale})`;
}

window.addEventListener("DOMContentLoaded", () => {
  fitGameToWindow();

  loadEnabledPerks();
  renderPerkCheckboxes();

  buildReel("reel1");
  buildReel("reel2");
  buildReel("reel3");
  buildReel("reel4");

  sessionStorage.removeItem("dbd_page_switching");
  stopAllSounds();

  const savedBgmVolume = localStorage.getItem("dbd_bgm_volume");
  const savedSeVolume = localStorage.getItem("dbd_se_volume");
  const savedAutoStop = localStorage.getItem("dbd_auto_stop_enabled");

  const bgmSlider = document.getElementById("bgmVolume");
  const seSlider = document.getElementById("seVolume");

  if (savedBgmVolume !== null) {
    const v = Number(savedBgmVolume);
    bgmVolume = v / 100;
    if (bgmSlider) bgmSlider.value = v;
    const text = document.getElementById("bgmVolumeText");
    if (text) text.textContent = `${v}%`;
  }

  if (savedSeVolume !== null) {
    const v = Number(savedSeVolume);
    seVolume = v / 100;
    if (seSlider) seSlider.value = v;
    const text = document.getElementById("seVolumeText");
    if (text) text.textContent = `${v}%`;
  }

  applyVolumes();

  autoStopEnabled = savedAutoStop === "1";
  updateAutoStopButton();

  setStatus("待機中");

  const playAudio = () => {
    if (bgmEnabled) {
      bgmSound?.play().catch(() => {});
    }
    document.removeEventListener("click", playAudio);
  };

  document.addEventListener("click", playAudio);
});

document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;

  const modal = document.getElementById("perkFilterModal");
  if (!modal) return;

  if (!modal.classList.contains("hidden")) {
    modal.classList.add("hidden");
  }
});

window.addEventListener("resize", fitGameToWindow);

</script>
